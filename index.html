<style id="mobile-fix">
/* Sidebar */
#sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;background:linear-gradient(180deg,#3D1535,#4A154B);z-index:50;transition:transform .3s ease;overflow-y:auto}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}
#hamburger{display:none;position:fixed;top:12px;left:12px;z-index:60;width:40px;height:40px;border:none;border-radius:8px;background:#4A154B;color:#fff;font-size:22px;cursor:pointer;align-items:center;justify-content:center}
/* Desktop */
@media(min-width:769px){
  #sidebar{transform:translateX(0)}
  #hamburger{display:none!important}
  .page-content{margin-left:260px}
}
/* Mobile */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}
  #hamburger{display:flex}
  .page-content{margin-left:0;padding:12px;padding-top:60px}
}
</style>
